name: Build and Deploy

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Setup Node.js 🔧
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies 📦
        run: npm ci --legacy-peer-deps

      - name: Build 🏗️
        run: npm run build
        env:
          CI: false

      - name: Verify Build Output 🔍
        run: |
          echo "Checking asset paths in index.html..."
          grep -o '/portfolio/[^"]*\.js\|/portfolio/[^"]*\.css' build/index.html || echo "⚠️ No /portfolio paths found"
          echo "Listing build files:"
          ls -la build/
          echo "Listing static files:"
          ls -la build/static/ || echo "No static directory found"

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
